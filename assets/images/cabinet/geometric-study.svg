<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <title>Geometric Study — Circles and Planes</title>
  <desc>Abstract geometric composition in warm clay and charcoal tones</desc>
  <rect width="400" height="400" fill="#FAF7F2"/>
  <circle cx="200" cy="200" r="120" stroke="#2A2825" stroke-width="1" fill="none" opacity="0.3"/>
  <circle cx="200" cy="200" r="80" stroke="#C67A5A" stroke-width="1.5" fill="none" opacity="0.5"/>
  <circle cx="200" cy="200" r="40" fill="#C4A265" opacity="0.15"/>
  <circle cx="200" cy="200" r="3" fill="#2A2825" opacity="0.6"/>
  <line x1="80" y1="200" x2="320" y2="200" stroke="#2A2825" stroke-width="0.5" opacity="0.2"/>
  <line x1="200" y1="80" x2="200" y2="320" stroke="#2A2825" stroke-width="0.5" opacity="0.2"/>
  <path d="M120 280 C140 300 180 310 200 300"
        stroke="#C4A265" stroke-width="0.8" fill="none" opacity="0.4"/>
  <path d="M280 120 C260 100 220 90 200 100"
        stroke="#C4A265" stroke-width="0.8" fill="none" opacity="0.4"/>
  <rect x="170" y="310" width="60" height="50" stroke="#4A4A48" stroke-width="0.6" fill="none" opacity="0.2"/>
  <circle cx="100" cy="140" r="12" stroke="#C67A5A" stroke-width="0.6" fill="none" opacity="0.25"/>
  <circle cx="300" cy="260" r="8" stroke="#C67A5A" stroke-width="0.5" fill="none" opacity="0.2"/>
</svg>
